<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Carte de visite - Rokhaya NDIAYE </title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background-color: #e6eff7;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background-color: #fff;
      border-radius: 20px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
      width: 90%;
      max-width: 400px;
      padding: 20px;
      box-sizing: border-box;
      position: relative;
    }
    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .profile-img {
      border-radius: 12px;
      width: 70px;
      height: 70px;
      object-fit: cover;
    }
    .logo-img {
      height: 70px;
      margin-left: auto;
    }
    h2 {
      font-size: 1.4em;
      color: #003580;
      margin: 15px 0 5px;
    }
    .subtitle {
      color: #4a6580;
      margin-bottom: 20px;
    }
    .info p {
      margin: 8px 0;
      display: flex;
      align-items: center;
      color: #003580;
      font-size: 0.95em;
    }
    .info a {
      color: #003580;
      text-decoration: none;
    }
    .info a:hover {
      text-decoration: underline;
    }
    .btn {
      display: block;
      margin: 12px auto;
      width: 90%;
      padding: 10px;
      background-color: #003580;
      color: white;
      text-align: center;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      font-size: 0.95em;
      text-decoration: none;
      transition: background-color 0.3s;
    }
    .btn:hover {
      background-color: #002a66;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="top">
      <img src="3F4A0072.jpg" alt="Rokhaya NDIAYE" class="profile-img" />
      <img src="Screenshot 2026-03-24 at 15.35.16.png" alt="Logo Ro&Partners" class="logo-img" />
    </div>

    <h2>Rokhaya NDIAYE</h2>
    <p class="subtitle">Fondatrice Ro&Partners</p>

    <div class="info">
      <p>📧 <a href="mailto:ro.ndiaye@roandpartners.com">ro.ndiaye@roandpartners.com</a></p>
      <p>📞 <a href="tel:+221 78 017 97 67">+221 78 017 97 67</a></p>
      <p>📍 <a href="https://www.google.com/maps/search/?api=1&query=Résidence+Athéna,+Rez-de-chaussée+Route+des+Almadies,+Dakar,+Senegal" target="_blank">
Résidence Athéna, Rez-de-chaussée Route des Almadies - Dakar, Sénégal
</a>
    </div>

    <a href="contact.vcf" class="btn" download>+ Enregistrer le contact</a>
    <a href="mailto:ro.ndiaye@roandpartners.com.com?subject=Demande de contact" class="btn">📩 M'envoyer vos coordonnées</a>
  </div>
</body>
</html>
